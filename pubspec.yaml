name: ziba
description: Cross-platform art wallpaper app. Muzei-inspired, WikiArt-powered.
publish_to: 'none'
version: 1.2.2+5

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3

  # Local database
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.21
  path: ^1.9.0

  # Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # Image loading
  cached_network_image: ^3.3.1

  # Background tasks (Android)
  workmanager: ^0.5.2

  # macOS: launch at login (SMAppService on macOS 13+)
  launch_at_startup: ^0.3.0

  # UI
  google_fonts: ^6.2.1

  # Data classes
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  drift_dev: ^2.16.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
